<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDB Source — Bildirim</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1c2030;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 400px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .close-btn {
    position: absolute;
    top: 14px; right: 14px;
    width: 30px; height: 30px;
    background: #f0f0f0;
    border: none; border-radius: 50%;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #555; line-height: 1;
  }
  .close-btn:hover { background: #e0e0e0; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f3f0ff; color: #7c3aed;
    font-size: 10px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
    margin-bottom: 16px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #7c3aed; animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .notif-title {
    font-size: 20px; font-weight: 800;
    color: #111; line-height: 1.3;
    margin-bottom: 12px;
  }
  .notif-msg {
    font-size: 15px; color: #444;
    line-height: 1.65;
  }
  .divider {
    height: 1px; background: #f0f0f0;
    margin: 20px 0;
  }
  .footer {
    display: flex; align-items: center; gap: 8px;
  }
  .footer-logo {
    font-size: 12px; font-weight: 800; color: #1c2030;
  }
  .footer-gen {
    font-size: 9px; font-weight: 700; letter-spacing: .15em;
    text-transform: uppercase;
    background: linear-gradient(90deg,#7c3aed,#1c2030);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .footer-time {
    margin-left: auto; font-size: 11px; color: #aaa;
  }
  .home-btn {
    display: block; width: 100%; margin-top: 18px;
    padding: 11px; background: #1c2030;
    border: none; border-radius: 10px;
    color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; text-align: center;
    text-decoration: none; letter-spacing: .03em;
  }
  .home-btn:hover { background: #2a3050; }
</style>
</head>
<body>
<div class="card">
  <button class="close-btn" onclick="window.close(); window.location.href='/'">✕</button>

  <div class="badge">
    <div class="badge-dot"></div>
    TDB Source Bildirimi
  </div>

  <div class="notif-title" id="notif-title">—</div>
  <div class="notif-msg"   id="notif-msg">—</div>

  <div class="divider"></div>

  <div class="footer">
    <span class="footer-logo">TDB Source™</span>
    <span class="footer-gen">Gen 8</span>
    <span class="footer-time" id="notif-time"></span>
  </div>

  <a class="home-btn" href="/">Ana Sayfaya Dön</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const title  = params.get('title') || 'Bildirim';
  const msg    = params.get('msg')   || '';

  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-msg').textContent   = msg;
  document.getElementById('notif-time').textContent  =
    new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  document.title = title + ' — TDB Source';
</script>
</body>
</html>
