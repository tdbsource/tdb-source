<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDB Source — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;width:100%;max-width:440px}
h1{font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#7c3aed;margin-bottom:28px}
label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase;display:block;margin:16px 0 6px}
input,textarea{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;padding:10px 14px;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#7c3aed}
textarea{resize:vertical;min-height:90px}
.btn{width:100%;margin-top:24px;padding:13px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.result{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:13px;display:none}
.ok{background:rgba(26,154,82,.15);border:1px solid rgba(26,154,82,.4);color:#4ade80}
.err{background:rgba(224,53,53,.15);border:1px solid rgba(224,53,53,.4);color:#f87171}
</style>
</head>
<body>
<div class="card">
  <h1>TDB Source™</h1>
  <div class="sub">Bildirim Paneli</div>

  <label>Admin Şifresi</label>
  <input type="password" id="pass" placeholder="••••••••">

  <label>Başlık</label>
  <input type="text" id="title" placeholder="Deprem Bildirimi" maxlength="64">

  <label>Mesaj</label>
  <textarea id="msg" placeholder="İzmir bölgesinde M4.5 deprem kaydedildi." maxlength="200"></textarea>

  <button class="btn" id="btn" onclick="gonder()">Gönder</button>
  <div class="result" id="result"></div>
</div>

<script>
async function gonder() {
  const pass  = document.getElementById('pass').value.trim();
  const title = document.getElementById('title').value.trim();
  const msg   = document.getElementById('msg').value.trim();
  const btn   = document.getElementById('btn');
  const res   = document.getElementById('result');

  if (!pass)  { goster('Şifre boş.', false); return; }
  if (!title) { goster('Başlık boş.', false); return; }
  if (!msg)   { goster('Mesaj boş.', false); return; }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';
  res.style.display = 'none';

  try {
    const r = await fetch('https://tdb-source.vercel.app/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass, title, message: msg })
    });
    const d = await r.json();
    if (d.success) {
      goster('✅ Gönderildi — ' + d.recipients + ' kişiye ulaştı.', true);
      document.getElementById('title').value = '';
      document.getElementById('msg').value = '';
    } else {
      goster('❌ ' + (d.error || 'Hata'), false);
    }
  } catch(e) {
    goster('❌ Bağlantı hatası', false);
  }

  btn.disabled = false;
  btn.textContent = 'Gönder';
}

function goster(txt, ok) {
  const el = document.getElementById('result');
  el.textContent = txt;
  el.className = 'result ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}
</script>
</body>
</html>
