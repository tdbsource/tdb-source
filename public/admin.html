<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDB Source — Bildirim Paneli</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1018;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
  }
  .logo { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .sub  { font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
          background: linear-gradient(90deg,#7c3aed,#a855f7);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text; font-weight: 700; margin-bottom: 28px; }
  label { font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: .08em;
          text-transform: uppercase; display: block; margin-bottom: 6px; margin-top: 16px; }
  input, textarea {
    width: 100%; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-size: 14px;
    padding: 10px 14px; outline: none;
    font-family: inherit;
  }
  input:focus, textarea:focus { border-color: #7c3aed; }
  textarea { resize: vertical; min-height: 90px; }
  input[type="password"] { letter-spacing: .1em; }
  .btn {
    width: 100%; margin-top: 24px; padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none; border-radius: 10px; color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: .04em; transition: opacity .2s;
  }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .result {
    margin-top: 16px; padding: 12px 16px;
    border-radius: 8px; font-size: 13px; display: none;
  }
  .result.ok  { background: rgba(26,154,82,.15); border: 1px solid rgba(26,154,82,.4); color: #4ade80; }
  .result.err { background: rgba(224,53,53,.15);  border: 1px solid rgba(224,53,53,.4);  color: #f87171; }
  .preview {
    margin-top: 20px; padding: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
  }
  .preview-label { font-size: 10px; color: rgba(255,255,255,.35); margin-bottom: 8px; letter-spacing:.1em; text-transform:uppercase; }
  .preview-title { font-size: 14px; font-weight: 700; color: #fff; }
  .preview-msg   { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 3px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">TDB Source™</div>
  <div class="sub">Bildirim Paneli</div>

  <label>Admin Şifresi</label>
  <input type="password" id="pass" placeholder="••••••••">

  <label>Bildirim Başlığı</label>
  <input type="text" id="title" placeholder="BAŞLIK" maxlength="64">

  <label>Mesaj</label>
  <textarea id="msg" placeholder="Bildirim İçeriği" maxlength="200"></textarea>

  <div class="preview">
    <div class="preview-label">Önizleme</div>
    <div class="preview-title" id="prev-title">—</div>
    <div class="preview-msg"   id="prev-msg">—</div>
  </div>

  <button class="btn" id="sendBtn" onclick="sendNotif()">Bildirimi Gönder</button>
  <div class="result" id="result"></div>
</div>

<script>
  document.getElementById('title').addEventListener('input', e => {
    document.getElementById('prev-title').textContent = e.target.value || '—';
  });
  document.getElementById('msg').addEventListener('input', e => {
    document.getElementById('prev-msg').textContent = e.target.value || '—';
  });

  async function sendNotif() {
    const pass  = document.getElementById('pass').value.trim();
    const title = document.getElementById('title').value.trim();
    const msg   = document.getElementById('msg').value.trim();
    const btn   = document.getElementById('sendBtn');
    const res   = document.getElementById('result');

    if (!pass)  { showResult('Şifreyi gir.', false); return; }
    if (!title) { showResult('Başlık boş olamaz.', false); return; }
    if (!msg)   { showResult('Mesaj boş olamaz.', false); return; }

    btn.disabled = true;
    btn.textContent = 'Gönderiliyor...';
    res.style.display = 'none';

    try {
      const r = await fetch('https://tdb-source.vercel.app/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass, title, message: msg })
      });
      const data = await r.json();
      if (data.success) {
        showResult(`✅ Gönderildi — ${data.recipients} kişiye ulaştı.`, true);
        document.getElementById('title').value = '';
        document.getElementById('msg').value   = '';
        document.getElementById('prev-title').textContent = '—';
        document.getElementById('prev-msg').textContent   = '—';
      } else {
        showResult('❌ Hata: ' + (data.error || 'Bilinmeyen hata'), false);
      }
    } catch(e) {
      showResult('❌ Bağlantı hatası: ' + e.message, false);
    }

    btn.disabled = false;
    btn.textContent = 'Bildirimi Gönder';
  }

  function showResult(text, ok) {
    const el = document.getElementById('result');
    el.textContent = text;
    el.className = 'result ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
  }
</script>
</body>
</html>
